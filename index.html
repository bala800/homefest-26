<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>HomeFest 26 Mega Dinner Menu</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #fff5e6;
        margin: 0;
        text-align: center;
      }

      header {
        background: #d35400;
        color: white;
        padding: 20px;
      }

      h1 {
        margin: 0;
      }

      .section {
        margin: 40px;
      }

      .menu-item {
        background: white;
        padding: 15px;
        margin: 10px auto;
        width: 60%;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      }
    </style>
  </head>

  <body>
    <header>
      <h1>🍽 HomeFest 2026 Mega Dinner</h1>
      <p>Welcome to the Grand Feast</p>
    </header>

    <div class="section">
      <h2>🥗 Starters</h2>

      <div class="menu-item">Chicken 65</div>
      <div class="menu-item">Paneer 65</div>
      <div class="menu-item">Sweet Corn Soup</div>
    </div>

    <div class="section">
      <h2>🍛 Main Course</h2>

      <div class="menu-item">Mutton Biryani</div>
      <div class="menu-item">Jackfruit Biryani</div>
      <div class="menu-item">Chicken Gravy</div>
      <div class="menu-item">Dal Tadka</div>
    </div>

    <div class="section">
      <h2>🍨 Desserts</h2>

      <div class="menu-item">Ice Cream</div>
      <div class="menu-item">Gulab Jamun</div>
    </div>

    <footer style="margin: 40px; color: gray">
      HomeFest 2026 | Mega Dinner Night
    </footer>
  </body>
</html>
